
name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for console.logs
        run: |
          if grep -r "console.log" assets/js/; then
            echo "Remove console.log before merging"
            exit 1
          fi
