<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Handwriting Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Indie+Flower&family=Kalam:wght@300;400;700&family=Shadows+Into+Light&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen text-gray-800 flex flex-col" style="font-family:'Inter',sans-serif; background:#f0f2f5;">

    <!-- Top Bar -->
    <header class="bg-white border-b border-gray-200 px-4 py-2.5 flex items-center justify-between sticky top-0 z-40 shadow-sm">
        <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            <span class="text-base font-bold text-gray-900">Text to Handwriting</span>
        </div>

        <button id="generateBtn" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-2 px-5 rounded-lg transition-all shadow-md flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            Convert to Handwriting
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>

        <div class="w-[140px]"></div> <!-- spacer for centering -->
    </header>

    <!-- Main 3-column Layout -->
    <main class="flex-1 flex overflow-hidden" style="height: calc(100vh - 49px);">

        <!-- LEFT SIDEBAR: Paper Backgrounds -->
        <aside id="leftSidebar" class="w-[220px] flex-shrink-0 bg-white border-r border-gray-200 overflow-y-auto p-4 hidden lg:block custom-scrollbar">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-bold text-gray-800 flex items-center gap-1.5">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
                    Backgrounds
                </h2>
            </div>

            <p class="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wider">Paper</p>
            <div class="grid grid-cols-3 gap-2 mb-5" id="paperGrid">
                <!-- Paper thumbnails generated by CSS -->
                <div class="paper-thumb active" data-paper="ruled" title="Ruled Notebook">
                    <div class="thumb-inner ruled-thumb"></div>
                </div>
                <div class="paper-thumb" data-paper="blank" title="Blank Paper">
                    <div class="thumb-inner blank-thumb"></div>
                </div>
                <div class="paper-thumb" data-paper="grid" title="Grid Paper">
                    <div class="thumb-inner grid-thumb"></div>
                </div>
            </div>

            <hr class="my-4 border-gray-100">

            <p class="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wider">Font Style</p>
            <div class="grid grid-cols-1 gap-1.5 mb-5" id="fontGrid">
                <div class="font-thumb active" data-font="Caveat">
                    <span style="font-family:'Caveat',cursive;font-size:16px;">Caveat Cursive</span>
                </div>
                <div class="font-thumb" data-font="Kalam">
                    <span style="font-family:'Kalam',cursive;font-size:15px;">Kalam Casual</span>
                </div>
                <div class="font-thumb" data-font="Indie Flower">
                    <span style="font-family:'Indie Flower',cursive;font-size:15px;">Indie Flower</span>
                </div>
                <div class="font-thumb" data-font="Shadows Into Light">
                    <span style="font-family:'Shadows Into Light',cursive;font-size:15px;">Shadows</span>
                </div>
            </div>

            <hr class="my-4 border-gray-100">

            <p class="text-xs text-gray-400 italic leading-snug">Paper background will be visible after converting to handwriting.</p>
        </aside>

        <!-- CENTER + RIGHT: Two equal pages side by side -->
        <section class="flex-1 flex flex-col overflow-hidden">

            <!-- Shared Toolbar -->
            <div class="bg-white border-b border-gray-200 px-4 py-2 flex flex-wrap items-center gap-3">
                <!-- Font size -->
                <div class="flex items-center border border-gray-300 rounded overflow-hidden">
                    <button id="fontSizeDown" class="px-2 py-1 text-gray-500 hover:bg-gray-100 text-sm font-bold transition-colors">−</button>
                    <input type="number" id="fontSize" value="28" min="16" max="64" class="w-10 text-center text-sm border-l border-r border-gray-300 outline-none py-1 bg-white font-medium text-gray-700">
                    <button id="fontSizeUp" class="px-2 py-1 text-gray-500 hover:bg-gray-100 text-sm font-bold transition-colors">+</button>
                </div>

                <div class="h-5 w-px bg-gray-300"></div>

                <!-- Ink color -->
                <div class="flex items-center gap-1.5">
                    <input type="color" id="inkColor" value="#000f55" class="h-7 w-7 cursor-pointer border-0 p-0 rounded shrink-0 shadow-sm">
                    <span class="text-xs text-gray-400">Ink</span>
                </div>

                <div class="h-5 w-px bg-gray-300"></div>

                <!-- Hidden selects controlled by sidebar -->
                <select id="paperType" class="sr-only">
                    <option value="ruled" selected>Ruled</option>
                    <option value="blank">Blank</option>
                    <option value="grid">Grid</option>
                </select>
                <select id="fontSelect" class="sr-only">
                    <option value="Caveat" selected>Caveat</option>
                    <option value="Kalam">Kalam</option>
                    <option value="Indie Flower">Indie Flower</option>
                    <option value="Shadows Into Light">Shadows Into Light</option>
                </select>

                <!-- Right-aligned output controls -->
                <div class="ml-auto flex items-center gap-2">
                    <button id="resetLayoutBtn" class="text-gray-400 hover:text-gray-600 transition-colors hidden" title="Reset dragged positions">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                    <button id="downloadBtn" class="bg-green-600 hover:bg-green-700 text-white text-xs font-semibold py-1.5 px-3 rounded transition-colors flex items-center gap-1 shadow-sm opacity-50 cursor-not-allowed" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Download
                    </button>
                </div>
            </div>

            <!-- Two pages side by side -->
            <div class="flex-1 overflow-y-auto flex flex-col lg:flex-row gap-6 p-4 md:p-6 custom-scrollbar items-start justify-center" style="background:#e8eaed;">

                <!-- Left: Writing Page -->
                <div class="flex flex-col items-center w-full lg:w-1/2">
                    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Write Here</span>
                    <div class="paper-page shadow-lg w-full max-w-[500px]">
                        <div id="inputMarginLine" class="paper-margin-line"></div>
                        <div id="textInput" contenteditable="true" class="custom-scrollbar" spellcheck="false">Hi
how are you</div>
                    </div>
                </div>

                <!-- Right: Output Preview Page -->
                <div class="flex flex-col items-center w-full lg:w-1/2">
                    <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Preview</span>
                    <canvas id="outputCanvas" width="794" height="1123" class="shadow-lg rounded-sm w-full max-w-[500px]" style="aspect-ratio:794/1123;"></canvas>
                </div>

            </div>
        </section>

    </main>

    <!-- Floating Canvas Toolbar for Selected Paragraph -->
    <div id="floatingToolbar" class="hidden absolute z-50 bg-white border border-gray-200 shadow-xl rounded-lg px-3 py-2 flex items-center gap-3">
        <div id="floatingMove" class="cursor-grab text-gray-400 hover:text-gray-600 flex items-center gap-1" title="Drag to move">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M9 19l3 3-3 3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
            <span class="text-xs font-medium">Move</span>
        </div>
        <div class="h-5 w-px bg-gray-300"></div>
        <div class="flex items-center gap-2" title="Change paragraph color">
            <input type="color" id="floatingColor" value="#000f55" class="h-6 w-6 cursor-pointer border-0 rounded p-0 bg-transparent">
            <span class="text-xs font-medium text-gray-600">Color</span>
        </div>
        <div class="h-5 w-px bg-gray-300"></div>
        <button id="floatingReset" class="text-gray-500 hover:text-red-500 transition-colors flex items-center gap-1" title="Reset position">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            <span class="text-xs font-medium">Reset</span>
        </button>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
